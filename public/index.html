<!DOCTYPE html>
<html>
<head>
  <title>Study Abroad Engine</title>
  <style>
body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  margin: 0;
  background: white;
  color: #1a1a1a;
}

/* NAVBAR */

.navbar {
  background: white;
  padding: 40px 0 20px 0;
  border-bottom: 1px solid #e8eeee;
}

.nav-container {
  width: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  height: 60px;
  width: auto;
  display: block;
  margin: 0 auto;
}

.sub-brand {
  font-size: 14px;
  color: #1a1a1a;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 12px;
  text-align: center;
}

/* PROGRESS BAR */

.progress-container {
  display: none;
}

.progress-bar {
  position: sticky;
  top: 0;
  height: 6px;
  background: #e6eeee;
  border-radius: 4px;
  margin-bottom: 40px;
  z-index: 1000;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #0F7C78;
  border-radius: 4px;
  transition: width 0.1s linear;
}

/* CONTAINER */

.container {
  width: 100%;
  max-width: none;
  margin: 0;
  background: white;
  padding: 30px;
  border-radius: 0;
  box-shadow: none;
}

/* SECTIONS */

.section {
  margin-bottom: 50px;
}

h2 {
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #0F7C78;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 20px;
  font-size: 13px;
  font-weight: 600;
  color: #333;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #dce8e8;
  font-size: 14px;
  background: #fafcfc;
  transition: 0.2s ease;
  color: #333;
}

select:focus {
  border-color: #0F7C78;
  background: white;
  outline: none;
}

select:invalid {
  color: #999;
}

select.valid {
  border-color: #0F7C78;
  background: #ffffff;
}

select.invalid {
  border-color: #d9534f;
  background: #fff5f5;
}

.form-message {
  text-align: center;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 500;
  min-height: 1.2em;
  color: #d9534f;
  margin-top: 20px;
}

/* BUTTON */

button {
  width: 100%;
  padding: 16px;
  margin-top: 40px;
  background: #0F7C78;
  color: white;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #0B4F4C;
  transform: translateY(-1px);
}

button:disabled {
  background: #a0c5c3;
  cursor: not-allowed;
}

#submitBtn:disabled {
  background: #a0c5c3;
  cursor: not-allowed;
  transform: none;
}

#submitBtn:disabled:hover {
  background: #a0c5c3;
  transform: none;
}

/* RESULTS */

@media (max-width: 768px) {
  .container {
    margin: 20px;
    padding: 25px;
  }

  .nav-container {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
}
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container" style="flex-direction: column;">
      <img src="D5944696-E4C2-4DEA-9C6F-5AF0144FEFFC.jpeg" 
           alt="UNIFER Logo" 
           class="logo">
      <div class="sub-brand">
        Study Abroad Decision Intelligence
      </div>
    </div>
  </header>

  <div class="container">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <form id="recommendForm">
      <div id="formMessage" class="form-message"></div>
      <div class="section">
        <h2>Step 1 — Define Your Priority</h2>

        <label>In your decision to study abroad which of the following is more important, select in decreasing order?</label>

        <label>Priority 1</label>
        <select id="priority_1" required>
          <option value="" disabled selected>Select Priority 1</option>
          <option value="Course">Course</option>
          <option value="Country">Country</option>
          <option value="Institution">Institution</option>
        </select>

        <label>Priority 2</label>
        <select id="priority_2" required>
          <option value="" disabled selected>Select Priority 2</option>
          <option value="Country">Country</option>
          <option value="Course">Course</option>
          <option value="Institution">Institution</option>
        </select>

        <label>Priority 3</label>
        <select id="priority_3" required>
          <option value="" disabled selected>Select Priority 3</option>
          <option value="Institution">Institution</option>
          <option value="Country">Country</option>
          <option value="Course">Course</option>
        </select>
      </div>

      <div class="section">
        <h2>Step 2 — Country Selection</h2>
        <label>What is your preferred cost of living per year range?</label>
        <select id="cost_of_living" required>
          <option value="" disabled selected>Select cost range</option>
          <option value="$0 - $20K">$0 - $20K</option>
          <option value="$20K – $30K">$20K – $30K</option>
          <option value="More than $30K">More than $30K</option>
        </select>

        <label>How does duration of post study work permit effect your decision?</label>
        <select id="work_permit_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly (3 years and above)">Very strongly (3 years and above)</option>
          <option value="Wouldn’t mind (less than 3 years and more than 1 year)">Wouldn’t mind (less than 3 years and more than 1 year)</option>
          <option value="Not really (1 year or less)">Not really (1 year or less)</option>
        </select>

        <label>Do you want to prefer a country where english is the first language?</label>
        <select id="english_preference" required>
          <option value="" disabled selected>Select preference</option>
          <option value="Yes">Yes</option>
          <option value="Prefer but flexible">Prefer but flexible</option>
          <option value="No preference">No preference</option>
        </select>

        <label>How strongly does government support affect your decision?</label>
        <select id="gov_support_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly">Very strongly</option>
          <option value="Wouldn’t mind">Wouldn’t mind</option>
          <option value="Don’t mind">Don’t mind</option>
        </select>

        <label>How strongly does opportunity to immigrate permanently affect your decision?</label>
        <select id="pr_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly">Very strongly</option>
          <option value="Wouldn’t mind">Wouldn’t mind</option>
          <option value="Don’t care">Don’t care</option>
        </select>
      </div>

      <div class="section">
        <h2>Step 3 — Course Selection</h2>
        <label>What level of program do you want to study?</label>
        <select id="level" required>
          <option value="" disabled selected>Select program level</option>
          <option value="UG">UG</option>
          <option value="PG">PG</option>
        </select>

        <label>What will be ideal course duration for you?</label>
        <select id="duration" required>
          <option value="" disabled selected>Select duration</option>
          <option value="3 years or less">3 years or less</option>
          <option value="More than 3 years">More than 3 years</option>
          <option value="1 year or less">1 year or less</option>
          <option value="More than 1 year">More than 1 year</option>
        </select>

        <label>How strongly courses with internship as a part of the curriculum impact your decision?</label>
        <select id="internship_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly">Very strongly</option>
          <option value="Wouldn’t mind">Wouldn’t mind</option>
          <option value="Don’t care">Don’t care</option>
        </select>

        <label>Select a preferred filter for courses with respect to GRE or GMAT requirements?</label>
        <select id="gre_filter" required>
          <option value="" disabled selected>Select filter</option>
          <option value="Without GRE or GMAT">Without GRE or GMAT</option>
          <option value="Without GRE">Without GRE</option>
          <option value="Without GMAT">Without GMAT</option>
          <option value="No filter">No filter</option>
        </select>

        <label>How strongly scholarships or bursaries affect your decision?</label>
        <select id="scholarship_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly (more than 20% of tuition)">Very strongly (more than 20% of tuition)</option>
          <option value="Wouldn’t mind getting one (less than 20% of tuition or none)">Wouldn’t mind getting one (less than 20% of tuition or none)</option>
          <option value="Don’t care">Don’t care</option>
        </select>

        <label>What is the amount of annual tuition fee which you think will be ideal for you?</label>
        <select id="tuition_band" required>
          <option value="" disabled selected>Select tuition range</option>
          <option value="Less than $12k">Less than $12k</option>
          <option value="$12k - $25k">$12k - $25k</option>
          <option value="More than $25K">More than $25K</option>
        </select>

        <label>Please select the field which associates the most with the field of study you want to study?</label>
        <select id="field" required>
          <option value="" disabled selected>Select field</option>
          <option value="engineering & tech">engineering & tech</option>
          <option value="business, management and economics">business, management and economics</option>
          <option value="science & applied science">science & applied science</option>
          <option value="medicine, health and life science">medicine, health and life science</option>
          <option value="social science & humanities">social science & humanities</option>
          <option value="arts, design & creative studies">arts, design & creative studies</option>
          <option value="law, public policy & governance">law, public policy & governance</option>
          <option value="hospitality, tourism & service industry">hospitality, tourism & service industry</option>
          <option value="education & teaching">education & teaching</option>
          <option value="agriculture, sustainability & environmental studies">agriculture, sustainability & environmental studies</option>
        </select>
      </div>

      <div class="section" style="border-bottom: none; margin-bottom: 0;">
        <h2>Step 4 — University Selection</h2>
        <label>What is your preference for location of the campus?</label>
        <select id="location_preference" required>
          <option value="" disabled selected>Select location</option>
          <option value="Main city">Main city</option>
          <option value="Smaller cities">Smaller cities</option>
          <option value="Anywhere in the country">Anywhere in the country</option>
        </select>

        <label>How strongly ranking affects your decision?</label>
        <select id="ranking_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Only want to apply in top institutions">Only want to apply in top institutions</option>
          <option value="Top and middle institutions are fine">Top and middle institutions are fine</option>
          <option value="All institution irrespective of ranking">All institution irrespective of ranking</option>
        </select>

        <label>How does career services affect your decision?</label>
        <select id="career_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly (placement driven institutions)">Very strongly (placement driven institutions)</option>
          <option value="Moderately (academics driven institutions)">Moderately (academics driven institutions)</option>
          <option value="Not that much">Not that much</option>
        </select>

        <label>How fast admission is a deciding factor?</label>
        <select id="admission_speed_importance" required>
          <option value="" disabled selected>Select importance</option>
          <option value="Very strongly">Very strongly</option>
          <option value="Not that much">Not that much</option>
          <option value="No">No</option>
        </select>
      </div>

      <button type="submit" id="submitBtn" disabled>Get My Recommendations</button>
    </form>

    <div id="results"></div>

    <button type="button" onclick="location.reload()" class="reset-btn" style="display: none; margin: 40px auto 0 auto; width: auto; min-width: 200px; background: #e6eeee; color: #0F7C78;">
      Start Again
    </button>
  </div>

  <footer class="footer">
    <p>© 2026 UNIFER. Structured decision intelligence for study abroad.</p>
  </footer>

  <script>
// Initial progress set to 25% for Step 1
document.addEventListener("DOMContentLoaded", () => {
  const fill = document.querySelector(".progress-fill");
  if (fill) fill.style.width = "25%";
});

// Update progress bar based on scroll
function updateProgress() {
  const update = () => {
    const winScroll = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
    const clientHeight = window.innerHeight || document.documentElement.clientHeight;
    
    // Total scrollable distance
    const height = scrollHeight - clientHeight;
    
    // Target ALL elements with .progress-fill (both fixed and in-container)
    const progressFills = document.querySelectorAll(".progress-fill");
    if (progressFills.length === 0) return;

    // Use scrollY for more reliable position
    const currentScroll = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;

    // Progress = 25% base + (percentage of scroll * 75%)
    // If page is not scrollable, height will be 0, so we default to 0% scroll
    const scrollPercent = height > 0 ? (currentScroll / height) : 0;
    const scrolled = 25 + scrollPercent * 75;
    const finalWidth = Math.min(Math.max(scrolled, 25), 100) + "%";
    
    progressFills.forEach(fill => {
      fill.style.width = finalWidth;
    });
  };
  
  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update, { passive: true });
  
  // Initial call
  update();
  
  // Periodic updates to handle content loading/DOM changes
  setInterval(update, 500);
}
updateProgress();

document.getElementById("recommendForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const selects = document.querySelectorAll("select");

  for (let select of selects) {
    if (!select.value) {
      alert("Please complete all required fields.");
      return;
    }
  }

  const resultsDiv = document.getElementById("results");
  const progressBar = document.querySelector(".progress-bar");
  const progressFill = document.querySelector(".progress-fill");

  // Reset progress bar
  progressBar.style.display = "block";
  progressFill.style.width = "0%";

  // Small delay so animation triggers
  setTimeout(() => {
    progressFill.style.width = "70%";
  }, 50);

  const priority_1 = document.getElementById("priority_1").value;
  const priority_2 = document.getElementById("priority_2").value;
  const priority_3 = document.getElementById("priority_3").value;

  const formMessage = document.getElementById("formMessage");
  if (formMessage) {
    formMessage.textContent = "";
    formMessage.className = "form-message";
  }

  if (
    priority_1 === priority_2 ||
    priority_1 === priority_3 ||
    priority_2 === priority_3
  ) {
    if (formMessage) {
      formMessage.textContent = "Please select unique priorities in decreasing order.";
      formMessage.classList.add("error");
    } else {
      alert("Please select unique priorities in decreasing order.");
    }
    return;
  }

  try {
    const response = await fetch("/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        level: document.getElementById("level").value,
        duration: document.getElementById("duration").value,
        tuition_band: document.getElementById("tuition_band").value,
        field: document.getElementById("field").value,
        gre_filter: document.getElementById("gre_filter").value,
        priority_1: priority_1,
        priority_2: priority_2,
        priority_3: priority_3,
        cost_of_living: document.getElementById("cost_of_living").value,
        english_preference: document.getElementById("english_preference").value,
        work_permit_importance: document.getElementById("work_permit_importance").value,
        gov_support_importance: document.getElementById("gov_support_importance").value,
        pr_importance: document.getElementById("pr_importance").value,
        internship_importance: document.getElementById("internship_importance").value,
        scholarship_importance: document.getElementById("scholarship_importance").value,
        ranking_importance: document.getElementById("ranking_importance").value,
        career_importance: document.getElementById("career_importance").value,
        location_preference: document.getElementById("location_preference").value,
        admission_speed_importance: document.getElementById("admission_speed_importance").value
      })
    });

    const data = await response.json();

    // Complete progress
    progressFill.style.width = "100%";

    setTimeout(() => {
      progressBar.style.display = "none";
    }, 500);

    resultsDiv.innerHTML = "";

    if (!Array.isArray(data)) {
      resultsDiv.innerHTML = "<p>No results found.</p>";
      return;
    }

    data.forEach((item, index) => {
      resultsDiv.innerHTML += `
        <div class="result-card ${index === 0 ? 'top-result' : ''}">
          <strong>${index === 0 ? 'Best Overall Match' : 'Recommended Pathway ' + (index + 1)}</strong>
          <p><b>Country:</b> ${item.country}</p>
          <p><b>University:</b> ${item.university}</p>
          <p><b>Course:</b> ${item.course}</p>
          <ul>
            ${item.explanation.map(e => `<li>${e}</li>`).join("")}
          </ul>
        </div>
      `;
    });

    resultsDiv.scrollIntoView({ behavior: "smooth" });

    // Show reset button after results
    const resetBtn = document.querySelector(".reset-btn");
    if (resetBtn) resetBtn.style.display = "block";

  } catch (error) {
    console.error(error);
    progressBar.style.display = "none";
    resultsDiv.innerHTML = "<p>Something went wrong. Please try again.</p>";
  }
});

const progressFill = document.querySelector(".progress-fill");

let ticking = false;

window.addEventListener("scroll", () => {
  if (!ticking) {
    window.requestAnimationFrame(() => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollTop / docHeight;

      progressFill.style.width = (progress * 100) + "%";
      ticking = false;
    });
    ticking = true;
  }
});

// Enable/disable submit button based on form validity
const form = document.getElementById("recommendForm");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("input", (e) => {
  submitBtn.disabled = !form.checkValidity();
  
  if (e.target.tagName === 'SELECT') {
    if (e.target.value) {
      e.target.classList.add('valid');
      e.target.classList.remove('invalid');
    } else {
      e.target.classList.remove('valid');
      e.target.classList.add('invalid');
    }
  }
});
</script>

</body>
</html>
