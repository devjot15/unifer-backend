<!DOCTYPE html>
<html>
<head>
  <title>Study Abroad Engine</title>
  <style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f7f7;
  color: #1e1e1e;
}

/* NAVBAR */

.navbar {
  background: white;
  padding: 15px 0;
  border-bottom: 1px solid #e8eeee;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-container {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

.logo {
  height: 40px;
}

.brand-tagline {
  font-size: 14px;
  color: #666;
  font-weight: 500;
}

/* MAIN CONTAINER */

.container {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* HEADINGS */

h2 {
  margin-top: 40px;
  font-size: 18px;
  color: #0F7C78;
  border-left: 4px solid #0F7C78;
  padding-left: 12px;
}

/* FORM */

label {
  display: block;
  margin-top: 20px;
  font-weight: 600;
  font-size: 14px;
}

select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #dcdcdc;
  font-size: 14px;
  transition: 0.2s ease;
}

select:focus {
  border-color: #0F7C78;
  outline: none;
}

/* BUTTON */

button {
  margin-top: 40px;
  width: 100%;
  padding: 14px;
  background: #0F7C78;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #0B4F4C;
}

/* RESULTS */

.result-card {
  background: #ffffff;
  padding: 25px;
  border-radius: 8px;
  margin-top: 25px;
  border: 1px solid #e4eeee;
  border-left: 5px solid #0F7C78;
}

.result-card strong {
  font-size: 16px;
  color: #0F7C78;
}

.result-card ul {
  padding-left: 20px;
  margin-top: 10px;
}

.section {
  margin-bottom: 50px;
  padding-bottom: 30px;
  border-bottom: 1px solid #f0f0f0;
}

.section h2 {
  margin-top: 0;
}

@media (max-width: 768px) {
  .container {
    margin: 20px 15px;
    padding: 25px;
  }

  .hero h1 {
    font-size: 22px;
  }
}
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <img src="logo.png" alt="UNIFER Logo" class="logo">
      <span class="brand-tagline">Decision Intelligence for Study Abroad</span>
    </div>
  </header>

  <div class="container">
    <form id="recommendForm">
      <div class="section">
        <h2>Questions For Country Selection (List A)</h2>
        <label>What is your preferred cost of living per year range?</label>
        <select id="cost_of_living">
          <option>$0 - $20K</option>
          <option>$20K – $30K</option>
          <option>More than $30K</option>
        </select>

        <label>How does duration of post study work permit effect your decision?</label>
        <select id="work_permit_importance">
          <option>Very strongly (3 years and above)</option>
          <option>Wouldn’t mind (less than 3 years and more than 1 year)</option>
          <option>Not really (1 year or less)</option>
        </select>

        <label>Do you want to prefer a country where english is the first language?</label>
        <select id="english_preference">
          <option>Yes</option>
          <option>Prefer but flexible</option>
          <option>No preference</option>
        </select>

        <label>How strongly does government support affect your decision?</label>
        <select id="gov_support_importance">
          <option>Very strongly</option>
          <option>Wouldn’t mind</option>
          <option>Don’t mind</option>
        </select>

        <label>How strongly does opportunity to immigrate permanently affect your decision?</label>
        <select id="pr_importance">
          <option>Very strongly</option>
          <option>Wouldn’t mind</option>
          <option>Don’t care</option>
        </select>
      </div>

      <div class="section">
        <h2>Questions for University Selection (List C)</h2>
        <label>What is your preference for location of the campus?</label>
        <select id="location_preference">
          <option>Main city</option>
          <option>Smaller cities</option>
          <option>Anywhere in the country</option>
        </select>

        <label>How strongly ranking affects your decision?</label>
        <select id="ranking_importance">
          <option>Only want to apply in top institutions</option>
          <option>Top and middle institutions are fine</option>
          <option>All institution irrespective of ranking</option>
        </select>

        <label>How does career services affect your decision?</label>
        <select id="career_importance">
          <option>Very strongly (placement driven institutions)</option>
          <option>Moderately (academics driven institutions)</option>
          <option>Not that much</option>
        </select>

        <label>How fast admission is a deciding factor?</label>
        <select id="admission_speed_importance">
          <option>Very strongly</option>
          <option>Not that much</option>
          <option>No</option>
        </select>
      </div>

      <div class="section">
        <h2>Questions for Course Selection (List B)</h2>
        <label>What level of program do you want to study?</label>
        <select id="level">
          <option>UG</option>
          <option>PG</option>
        </select>

        <label>What will be ideal course duration for you?</label>
        <select id="duration">
          <option>3 years or less</option>
          <option>More than 3 years</option>
          <option>1 year or less</option>
          <option>More than 1 year</option>
        </select>

        <label>How strongly courses with internship as a part of the curriculum impact your decision?</label>
        <select id="internship_importance">
          <option>Very strongly</option>
          <option>Wouldn’t mind</option>
          <option>Don’t care</option>
        </select>

        <label>Select a preferred filter for courses with respect to GRE or GMAT requirements?</label>
        <select id="gre_filter">
          <option>Without GRE or GMAT</option>
          <option>Without GRE</option>
          <option>Without GMAT</option>
          <option>No filter</option>
        </select>

        <label>How strongly scholarships or bursaries affect your decision?</label>
        <select id="scholarship_importance">
          <option>Very strongly (more than 20% of tuition)</option>
          <option>Wouldn’t mind getting one (less than 20% of tuition or none)</option>
          <option>Don’t care</option>
        </select>

        <label>What is the amount of annual tuition fee which you think will be ideal for you?</label>
        <select id="tuition_band">
          <option>Less than $12k</option>
          <option>$12k - $25k</option>
          <option>More than $25K</option>
        </select>

        <label>Please select the field which associates the most with the field of study you want to study?</label>
        <select id="field">
          <option>engineering & tech</option>
          <option>business, management and economics</option>
          <option>science & applied science</option>
          <option>medicine, health and life science</option>
          <option>social science & humanities</option>
          <option>arts, design & creative studies</option>
          <option>law, public policy & governance</option>
          <option>hospitality, tourism & service industry</option>
          <option>education & teaching</option>
          <option>agriculture, sustainability & environmental studies</option>
        </select>
      </div>

      <div class="section" style="border-bottom: none; margin-bottom: 0;">
        <h2>Introductory Question</h2>
        <label>In your decision to study abroad which of the following is more important, select in decreasing order?</label>
        <label>Priority 1:</label>
        <select id="priority_1">
          <option>Course</option>
          <option>Country</option>
          <option>Institution</option>
        </select>

        <label>Priority 2:</label>
        <select id="priority_2">
          <option>Country</option>
          <option>Course</option>
          <option>Institution</option>
        </select>

        <label>Priority 3:</label>
        <select id="priority_3">
          <option>Institution</option>
          <option>Country</option>
          <option>Course</option>
        </select>
      </div>

      <button type="submit">Get My Recommendations</button>
    </form>

    <div id="results"></div>
  </div>

<script>
document.getElementById("recommendForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const body = {
    level: document.getElementById("level").value,
    duration: document.getElementById("duration").value,
    tuition_band: document.getElementById("tuition_band").value,
    field: document.getElementById("field").value,
    gre_filter: document.getElementById("gre_filter").value,
    
    cost_of_living: document.getElementById("cost_of_living").value,
    work_permit_importance: document.getElementById("work_permit_importance").value,
    english_preference: document.getElementById("english_preference").value,
    gov_support_importance: document.getElementById("gov_support_importance").value,
    pr_importance: document.getElementById("pr_importance").value,

    location_preference: document.getElementById("location_preference").value,
    ranking_importance: document.getElementById("ranking_importance").value,
    career_importance: document.getElementById("career_importance").value,
    admission_speed_importance: document.getElementById("admission_speed_importance").value,
    
    internship_importance: document.getElementById("internship_importance").value,
    scholarship_importance: document.getElementById("scholarship_importance").value,
    
    priority_1: document.getElementById("priority_1").value,
    priority_2: document.getElementById("priority_2").value,
    priority_3: document.getElementById("priority_3").value
  };

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "<p>Analyzing your preferences...</p>";

  try {
    const response = await fetch("/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      throw new Error("Failed to fetch recommendations");
    }

    const data = await response.json();

    resultsDiv.innerHTML = "";

    if (!Array.isArray(data)) {
      resultsDiv.innerHTML = `<p>${data.message || "No results found."}</p>`;
      return;
    }

    data.forEach((item, index) => {
      const explanationHtml = item.explanation && item.explanation.length > 0 
        ? `<ul>${item.explanation.map(e => `<li>${e}</li>`).join("")}</ul>` 
        : "";

      resultsDiv.innerHTML += `
        <div class="result-card">
          <strong>Recommended Pathway #${index + 1}</strong>
          <hr style="border:none; border-top:1px solid #eee; margin:15px 0;">
          <p><b>Country:</b> ${item.country}</p>
          <p><b>University:</b> ${item.university}</p>
          <p><b>Course:</b> ${item.course}</p>
          <p><b>Why this fits you:</b></p>
          ${explanationHtml}
        </div>
      `;
    });
  } catch (error) {
    console.error("Error:", error);
    resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
  }
});
</script>

</body>
</html>
