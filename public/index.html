<!DOCTYPE html>
<html>
<head>
  <title>Study Abroad Engine</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, button { margin-top: 5px; padding: 8px; width: 100%; }
    .result-item { border-bottom: 1px solid #ccc; padding: 10px 0; }
    h1 { color: #2c3e50; }
    hr { margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Study Abroad Recommendation Engine</h1>

  <form id="recommendForm">
    <label>Program Level:</label>
    <select id="level">
      <option>UG</option>
      <option>PG</option>
    </select>

    <label>Duration:</label>
    <select id="duration">
      <option>3 years or less</option>
      <option>More than 3 years</option>
      <option>1 year or less</option>
    </select>

    <label>Tuition Band:</label>
    <select id="tuition">
      <option>Less than $12k</option>
      <option>$12k - $25k</option>
      <option>More than $25K</option>
    </select>

    <label>Field:</label>
    <select id="field">
      <option>engineering & tech</option>
    </select>

    <label>GRE Filter:</label>
    <select id="gre">
      <option>No filter</option>
      <option>Without GRE or GMAT</option>
    </select>

    <hr>
    <h2>Questions For Country Selection (List A)</h2>

    <label>What is your preferred cost of living per year range?</label>
    <select id="cost_of_living">
      <option>$0 - $20K</option>
      <option>$20K – $30K</option>
      <option>More than $30K</option>
    </select>

    <label>How does duration of post study work permit effect your decision?</label>
    <select id="work_permit_importance">
      <option>Very strongly (3 years and above)</option>
      <option>Wouldn’t mind (less than 3 years and more than 1 year)</option>
      <option>Not really (1 year or less)</option>
    </select>

    <label>Do you want to prefer a country where english is the first language?</label>
    <select id="english_preference">
      <option>Yes</option>
      <option>Prefer but flexible</option>
      <option>No preference</option>
    </select>

    <label>How strongly does government support affect your decision?</label>
    <select id="gov_support_importance">
      <option>Very strongly</option>
      <option>Wouldn’t mind</option>
      <option>Don’t mind</option>
    </select>

    <label>How strongly does opportunity to immigrate permanently affect your decision?</label>
    <select id="pr_importance">
      <option>Very strongly</option>
      <option>Wouldn’t mind</option>
      <option>Don’t care</option>
    </select>

    <hr>
    <h2>Questions for University Selection (List C)</h2>

    <label>What is your preference for location of the campus?</label>
    <select id="location_preference">
      <option>Main city</option>
      <option>Smaller cities</option>
      <option>Anywhere in the country</option>
    </select>

    <label>How strongly ranking affects your decision?</label>
    <select id="ranking_importance">
      <option>Only want to apply in top institutions</option>
      <option>Top and middle institutions are fine</option>
      <option>All institution irrespective of ranking</option>
    </select>

    <label>How does career services affect your decision?</label>
    <select id="career_importance">
      <option>Very strongly (placement driven institutions)</option>
      <option>Moderately (academics driven institutions)</option>
      <option>Not that much</option>
    </select>

    <label>How fast admission is a deciding factor?</label>
    <select id="admission_speed_importance">
      <option>Very strongly</option>
      <option>Not that much</option>
      <option>No</option>
    </select>

    <hr>
    <h3>Course Preferences</h3>
    <label>Internship Importance:</label>
    <select id="internship_importance">
      <option>Very strongly</option>
      <option>Wouldn’t mind</option>
      <option>Don’t care</option>
    </select>

    <label>Scholarship Importance:</label>
    <select id="scholarship_importance">
      <option>Very strongly (more than 20% of tuition)</option>
      <option>Wouldn’t mind getting one (less than 20% of tuition or none)</option>
      <option>Don’t care</option>
    </select>

    <hr>
    <h2>Introductory Question</h2>
    <label>In your decision to study abroad which of the following is more important, select in decreasing order?</label><br>

    Priority 1:
    <select id="priority_1">
      <option>Course</option>
      <option>Country</option>
      <option>Institution</option>
    </select><br><br>

    Priority 2:
    <select id="priority_2">
      <option>Country</option>
      <option>Course</option>
      <option>Institution</option>
    </select><br><br>

    Priority 3:
    <select id="priority_3">
      <option>Institution</option>
      <option>Country</option>
      <option>Course</option>
    </select>

    <button type="submit">Get Recommendations</button>
  </form>

  <h2>Results</h2>
  <div id="results"></div>

<script>
document.getElementById("recommendForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const body = {
    level: document.getElementById("level").value,
    duration: document.getElementById("duration").value,
    tuition_band: document.getElementById("tuition").value,
    field: document.getElementById("field").value,
    gre_filter: document.getElementById("gre").value,
    
    cost_of_living: document.getElementById("cost_of_living").value,
    work_permit_importance: document.getElementById("work_permit_importance").value,
    english_preference: document.getElementById("english_preference").value,
    gov_support_importance: document.getElementById("gov_support_importance").value,
    pr_importance: document.getElementById("pr_importance").value,

    location_preference: document.getElementById("location_preference").value,
    ranking_importance: document.getElementById("ranking_importance").value,
    career_importance: document.getElementById("career_importance").value,
    admission_speed_importance: document.getElementById("admission_speed_importance").value,
    
    internship_importance: document.getElementById("internship_importance").value,
    scholarship_importance: document.getElementById("scholarship_importance").value,
    
    priority_1: document.getElementById("priority_1").value,
    priority_2: document.getElementById("priority_2").value,
    priority_3: document.getElementById("priority_3").value
  };

  const response = await fetch("/recommend", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await response.json();

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if (!Array.isArray(data)) {
    resultsDiv.innerHTML = `<p>${data.message || "No results found."}</p>`;
    return;
  }

  data.forEach(item => {
    resultsDiv.innerHTML += `
      <div class="result-item">
        <strong>${item.country}</strong><br>
        ${item.university}<br>
        ${item.course}<br>
        Score: ${item.finalScore.toFixed(3)}
      </div>
    `;
  });
});
</script>

</body>
</html>
